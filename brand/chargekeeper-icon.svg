<?xml version="1.0" encoding="UTF-8"?>
<!--
  ChargeKeeper app icon — "0z0 steel battery".

  A flat, squared battery outline in muted SteelBlue, with a Sage-green interior fill and a
  Terracotta vertical "guard" line crossing the body — ChargeKeeper's own product palette
  (== GaugePalette SteelBlue / SageGreen / Terracotta). No gradients: flat geometric shapes,
  matching the ZeroZero "0z0 geometric" studio look. Fully transparent background — no
  background plate — scaled to fill the canvas (matching modern Windows 11 icon conventions,
  where the shell supplies its own rounded-square mask/backdrop rather than the app baking one in).

  This file is the authoritative vector. The shipped Assets\AppIcon.ico is generated from
  the same geometry by scripts\make-appicon.ps1 (which redraws it natively per size), and
  Helpers\IconGenerator.cs redraws it at runtime for the startup tray icon.
-->
<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <!-- Battery body outline: flat SteelBlue, round line-join -->
  <rect x="15" y="80" width="191" height="96" rx="6"
        fill="none" stroke="#7FA8B8" stroke-width="13" stroke-linejoin="round"/>

  <!-- Battery cap (positive terminal): solid SteelBlue -->
  <rect x="221" y="106" width="20" height="44" rx="3" fill="#7FA8B8"/>

  <!-- Interior charge fill: Sage green at 90% opacity -->
  <rect x="36" y="101" width="110" height="55" rx="3" fill="#7AB88F" opacity="0.9"/>

  <!-- Terracotta guard line crossing the body (flat/butt caps) -->
  <line x1="161" y1="66" x2="161" y2="190" stroke="#C9926B" stroke-width="9"/>
</svg>
