<?xml version="1.0" encoding="UTF-8"?>
<!--
  ChargeKeeper app icon — "Guarded Battery".

  A battery outline in a purple→indigo gradient, with an amber vertical line at the ~80 %
  mark representing the charge-limit threshold (slightly overshooting the body so it reads
  as a marker, not a fill edge). Fully transparent background — no background plate — scaled
  to fill the canvas (matching modern Windows 11 icon conventions, where the shell supplies
  its own rounded-square mask/backdrop rather than the app baking one in).

  This file is the authoritative vector. The shipped Assets\AppIcon.ico is generated from
  the same geometry by scripts\make-appicon.ps1 (which redraws it natively per size), and
  Helpers\IconGenerator.cs redraws it at runtime for the startup tray icon.
-->
<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="body" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7b8cff"/>
      <stop offset="1" stop-color="#3f5be0"/>
    </linearGradient>
  </defs>

  <!-- Battery body outline -->
  <rect x="13" y="78" width="195" height="100" rx="23"
        fill="none" stroke="url(#body)" stroke-width="15"/>

  <!-- Battery cap (positive terminal) -->
  <rect x="221" y="103" width="23" height="50" rx="9" fill="#3f5be0"/>

  <!-- Interior charge fill (~80 % of the body) -->
  <rect x="36" y="101" width="110" height="55" rx="11" fill="url(#body)" opacity="0.85"/>

  <!-- Amber charge-limit line at the 80 % mark -->
  <line x1="161" y1="63" x2="161" y2="193" stroke="#d8a657" stroke-width="9"
        stroke-linecap="round"/>
</svg>
