ShortDescription: Battery care from the system tray — charge limits, live battery gauge, smart standby.
Description: >-
  ChargeKeeper keeps your laptop battery healthy from the system tray: set battery
  charge limits, watch a live battery gauge and history graph, and control smart
  standby. Runs on Lenovo ThinkPads today (requires the Lenovo Power Management
  Driver); built to support more hardware over time. Formerly published as
  "Lenovo Power Tray". The app requires administrator rights at runtime.
