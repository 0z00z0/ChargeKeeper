<?xml version="1.0" encoding="UTF-8"?>
<!--
  ChargeKeeper installer — large wizard side banner (WizardImageFile).

  Studio look per 0z0-design/design-language.md: dark #0a0f17 background with a steel-tinted
  glow (#16232c). The PRODUCT framing is now FLAT muted (no gradients) — a top SteelBlue bar and
  a bottom SteelBlue/Sage/Terracotta triband, a quiet echo of the app's GaugePalette (the
  flat-iconography rule, 0z0-design/icon-library.md). The [Ø] STUDIO mark KEEPS its canonical
  bracket gradients (teal->blue, purple->indigo) and amber ring/slash — after this change the
  mark is the only place the full studio gradient survives on the banner, which is exactly the
  intended "made by ZeroZero Software" framing. Below the studio block sits the ChargeKeeper
  PRODUCT battery glyph (0z0 steel, flat) and the "ChargeKeeper" wordmark in Cascadia Mono.

  This SVG is the design reference. The shipped .bmp files are rendered from the SAME
  geometry natively (GDI+) by installer\make-wizard-images.ps1, because there is no SVG
  rasteriser on the build machine (same constraint as scripts\make-appicon.ps1). If you
  change this design, update that script's geometry to match and re-run it.

  Reference canvas 164x314 (Inno's base WizardImageFile size).
-->
<svg width="164" height="314" viewBox="0 0 164 314" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="22%" r="70%">
      <stop offset="0" stop-color="#16232c"/>
      <stop offset="1" stop-color="#0a0f17"/>
    </radialGradient>
    <!-- Canonical [Ø] studio-mark bracket gradients (the ONLY surviving studio gradients here). -->
    <linearGradient id="lbrk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#27e0c8"/><stop offset="1" stop-color="#11a9d6"/>
    </linearGradient>
    <linearGradient id="rbrk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7b8cff"/><stop offset="1" stop-color="#3f5be0"/>
    </linearGradient>
  </defs>

  <rect width="164" height="314" fill="url(#bg)"/>

  <!-- Flat muted product framing (no gradients). Both bars 3 units tall. -->
  <rect x="0" y="0" width="164" height="3" fill="#7FA8B8"/>
  <rect x="0"        y="311" width="54.67" height="3" fill="#7FA8B8"/>
  <rect x="54.67"    y="311" width="54.67" height="3" fill="#7AB88F"/>
  <rect x="109.33"   y="311" width="54.67" height="3" fill="#C9926B"/>

  <!-- [Ø] studio mark, ~52px, centred near the top (256-canvas geometry scaled 0.2031, at x=56 y=22) -->
  <g transform="translate(56,22) scale(0.2031)">
    <rect x="8" y="8" width="240" height="240" rx="52" fill="#12202f"/>
    <polyline points="104,78 82,78 82,178 104,178" fill="none" stroke="url(#lbrk)" stroke-width="15" stroke-linecap="round" stroke-linejoin="round"/>
    <polyline points="152,78 174,78 174,178 152,178" fill="none" stroke="url(#rbrk)" stroke-width="15" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="112" y="88" width="32" height="80" rx="12" fill="none" stroke="#d8a657" stroke-width="10"/>
    <line x1="148" y1="92" x2="108" y2="164" stroke="#d8a657" stroke-width="6" stroke-linecap="round"/>
  </g>

  <!-- Studio label + studio tagline, under the [Ø] mark. -->
  <text x="82" y="90"  text-anchor="middle" font-family="Cascadia Mono, monospace" font-size="11" fill="#dde6f4">ZeroZero Software</text>
  <text x="82" y="106" text-anchor="middle" font-family="Cascadia Mono, monospace" font-size="9"  fill="#64788f">Small tools. Zero bloat.</text>

  <!-- Divider between the studio and product blocks. -->
  <line x1="40" y1="120" x2="124" y2="120" stroke="#1a2840" stroke-width="1"/>

  <!-- ChargeKeeper product battery glyph (0z0 steel, flat), ~110px wide (256-canvas scaled 0.4297, at x=27 y=138) -->
  <g transform="translate(27,138) scale(0.4297)">
    <rect x="15" y="80" width="191" height="96" rx="6" fill="none" stroke="#7FA8B8" stroke-width="13" stroke-linejoin="round"/>
    <rect x="221" y="106" width="20" height="44" rx="3" fill="#7FA8B8"/>
    <rect x="36" y="101" width="110" height="55" rx="3" fill="#7AB88F" opacity="0.9"/>
    <line x1="161" y1="66" x2="161" y2="190" stroke="#C9926B" stroke-width="9"/>
  </g>

  <!-- ChargeKeeper wordmark in Cascadia Mono (no tagline under it). -->
  <text x="82" y="256" text-anchor="middle" font-family="Cascadia Mono, monospace" font-size="16" font-weight="700" fill="#dde6f4">ChargeKeeper</text>
</svg>
