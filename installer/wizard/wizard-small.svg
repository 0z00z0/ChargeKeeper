<?xml version="1.0" encoding="UTF-8"?>
<!--
  ChargeKeeper installer — small header image (WizardSmallImageFile), shown top-right on
  every interior wizard page. The ChargeKeeper PRODUCT battery glyph on the studio dark
  background. Rendered natively (GDI+) by installer\make-wizard-images.ps1 — see
  wizard-image.svg for why (no SVG rasteriser on the build machine).

  Reference canvas 55x58 (Inno's base WizardSmallImageFile size).
-->
<svg width="55" height="58" viewBox="0 0 55 58" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="body" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7b8cff"/><stop offset="1" stop-color="#3f5be0"/>
    </linearGradient>
  </defs>
  <rect width="55" height="58" fill="#0a0f17"/>
  <!-- battery glyph ~46px wide (256-canvas scaled 0.18, centred at x=4.5 y=15) -->
  <g transform="translate(4.5,15) scale(0.18)">
    <rect x="13" y="78" width="195" height="100" rx="23" fill="none" stroke="url(#body)" stroke-width="15"/>
    <rect x="221" y="103" width="23" height="50" rx="9" fill="#3f5be0"/>
    <rect x="36" y="101" width="110" height="55" rx="11" fill="url(#body)" opacity="0.85"/>
    <line x1="161" y1="63" x2="161" y2="193" stroke="#d8a657" stroke-width="9" stroke-linecap="round"/>
  </g>
</svg>
