name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 1.2.3 — without the leading v)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Build, sign, and publish the installer
  # ─────────────────────────────────────────────────────────────────────────────
  release:
    runs-on: windows-latest

    # Secrets surfaced as job-level env so step `if:` conditions can test them
    # (a step's own `env:` block is NOT visible to that step's `if:`).
    env:
      CODE_SIGN_PFX: ${{ secrets.CODE_SIGN_PFX }}
      CODE_SIGN_PASSWORD: ${{ secrets.CODE_SIGN_PASSWORD }}

    outputs:
      version: ${{ steps.version.outputs.version }}
      sha256: ${{ steps.sha256.outputs.sha256 }}

    steps:
      # ── 1. Checkout (full history so tags resolve) ──────────────────────────
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      # ProjectReference to ZeroZero.Brand.WinUI uses a relative path expecting a
      # sibling checkout (..\0z0-shared\src\...) — locally that's a sibling
      # folder. actions/checkout refuses a `path:` outside the workspace
      # ("not under D:\a\ChargeKeeper\ChargeKeeper"), so clone the (public) repo
      # directly beside this checkout instead. (Repo was renamed ZeroZeroBrand → 0z0-shared.)
      #
      # PINNED to the exact 0z0-shared commit this app was validated against. The
      # SHA is read from the shared `.github/0z0-shared-ref` file (same file ci.yml
      # reads) so the release and CI pins can't drift; bump it there.
      - name: Clone 0z0-shared (sibling dependency, pinned)
        shell: pwsh
        run: |
          $ref = (Get-Content .github/0z0-shared-ref |
                  Where-Object { $_.Trim() -and $_ -notmatch '^\s*#' } |
                  Select-Object -First 1).Trim()
          Write-Host "Pinned 0z0-shared ref: $ref"
          git clone https://github.com/0z00z0/0z0-shared.git ../0z0-shared
          git -C ../0z0-shared checkout --detach $ref

      # ── 2. Resolve version string ────────────────────────────────────────────
      # Tag-triggered: strip the leading 'v'.
      # workflow_dispatch: use the input; fall back to '0.0.0-dev'.
      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -match '^refs/tags/v(.+)$') {
            $ver = $Matches[1]
          } elseif ('${{ github.event.inputs.version }}' -ne '') {
            $ver = '${{ github.event.inputs.version }}'
          } else {
            $ver = '0.0.0-dev'
          }
          Write-Host "Version: $ver"
          "version=$ver" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      # ── 3. Set up .NET 10 ────────────────────────────────────────────────────
      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      # ── 4. Install Inno Setup 6 via Chocolatey ───────────────────────────────
      - name: Install Inno Setup 6
        shell: pwsh
        run: choco install innosetup -y --no-progress

      # ── 5. Set up MSVC C++ environment ───────────────────────────────────────
      # ilammy/msvc-dev-cmd calls vcvars64.bat and exports the env vars into the
      # subsequent steps, so build.cmd's own vcvars call is a no-op (harmless).
      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # ── 6. Build native bridge (LenPower.dll) ────────────────────────────────
      - name: Build native bridge
        shell: cmd
        run: native\build.cmd

      # ── 7. Build installer (publish + ISCC) ──────────────────────────────────
      # build-installer.ps1 re-runs native\build.cmd and dotnet publish internally.
      # That's fine: the MSVC env from step 5 is still active, and dotnet publish
      # is fast on a warm NuGet cache. Keeping it this way means the script remains
      # usable standalone without changes.
      - name: Build installer
        shell: pwsh
        run: |
          $ver = '${{ steps.version.outputs.version }}'
          Write-Host "Building installer for version $ver"
          & installer\build-installer.ps1 -Version $ver

      # ── 8. Authenticode sign (skipped gracefully when secrets are absent) ────
      # Signs with the project's certificate (PFX delivered via the CODE_SIGN_PFX
      # secret). RFC-3161 timestamped so the signature stays valid after the cert
      # expires. The app exe is signed FIRST, then the installer is recompiled (so
      # it bundles the signed exe) and signed once — the shipped installer never
      # embeds an unsigned exe.
      - name: Sign binaries
        if: ${{ env.CODE_SIGN_PFX != '' }}
        shell: pwsh
        run: |
          $pfxPath = Join-Path $env:RUNNER_TEMP 'codesign.pfx'
          [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:CODE_SIGN_PFX))

          $signtool = Get-ChildItem 'C:\Program Files (x86)\Windows Kits\10\bin' `
            -Filter 'signtool.exe' -Recurse -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -like '*x64*' } |
            Sort-Object FullName -Descending | Select-Object -First 1 -ExpandProperty FullName
          if (-not $signtool) { throw 'signtool.exe not found under Windows Kits.' }
          Write-Host "Using signtool: $signtool"

          function Invoke-Sign([string]$path) {
            & $signtool sign /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 `
              /f $pfxPath /p $env:CODE_SIGN_PASSWORD $path
            if ($LASTEXITCODE -ne 0) { throw "signtool failed on $path ($LASTEXITCODE)." }
          }

          # 1) Sign the published app exe.
          Invoke-Sign 'publish\ChargeKeeper.exe'

          # 2) Recompile the installer (now bundling the signed exe), then sign it.
          $iscc = (Get-ChildItem 'C:\Program Files (x86)\Inno Setup 6\ISCC.exe' -ErrorAction SilentlyContinue).FullName
          if (-not $iscc) { throw 'ISCC.exe not found.' }
          & $iscc "/DAppVersion=${{ steps.version.outputs.version }}" "/DPublishDir=$(Resolve-Path publish)" installer\ChargeKeeper.iss
          if ($LASTEXITCODE -ne 0) { throw "ISCC failed ($LASTEXITCODE)." }
          Invoke-Sign "installer\Output\ChargeKeeper-Setup-${{ steps.version.outputs.version }}.exe"

          Remove-Item $pfxPath -Force
          Write-Host 'Signed app exe + installer; PFX deleted.'

      # ── 8b. Warn if signing was skipped (no secret) ──────────────────────────
      - name: Warn if unsigned
        if: ${{ env.CODE_SIGN_PFX == '' }}
        shell: pwsh
        run: Write-Warning 'CODE_SIGN_PFX secret not set — installer is UNSIGNED. Add the secret to sign CI releases.'

      # ── 9. Compute SHA256 of the installer ───────────────────────────────────
      - name: Compute installer SHA256
        id: sha256
        shell: pwsh
        run: |
          $setup = "installer\Output\ChargeKeeper-Setup-${{ steps.version.outputs.version }}.exe"
          $hash  = (Get-FileHash $setup -Algorithm SHA256).Hash.ToUpper()
          Write-Host "SHA256: $hash"
          "sha256=$hash" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      # ── 10. Update winget installer manifest ─────────────────────────────────
      - name: Update winget manifest
        shell: pwsh
        run: |
          $ver    = '${{ steps.version.outputs.version }}'
          $sha256 = '${{ steps.sha256.outputs.sha256 }}'
          $tag    = "v$ver"

          $installerYaml = 'installer\winget\0z00z0.ChargeKeeper.installer.yaml'
          $versionYaml   = 'installer\winget\0z00z0.ChargeKeeper.yaml'
          $localeYaml    = 'installer\winget\0z00z0.ChargeKeeper.locale.en-US.yaml'

          # Helper: replace a YAML scalar in-place, preserving indentation.
          #
          # The leading \s* is load-bearing. Without it the pattern was anchored hard to ^, so it
          # only ever matched TOP-LEVEL keys: PackageVersion (column 0) patched, while the keys
          # nested under Installers: — InstallerUrl, InstallerSha256, DisplayVersion — silently
          # never matched and shipped frozen at their 1.0.0 placeholder values in every release up
          # to and including v1.6.3. -replace returns the string unchanged when nothing matches, so
          # it failed silently; and `winget validate` passed throughout because it checks the SCHEMA,
          # not whether InstallerUrl resolves or InstallerSha256 matches the asset. Nobody noticed
          # because the winget submission (#15) is blocked, so the manifests are never consumed.
          #
          # Throws when a key doesn't match, so a future YAML reshuffle fails the release loudly
          # instead of silently publishing a stale manifest again.
          # The (?:-[ \t]+)? is load-bearing too: the indent class does NOT match '-', so a key that
          # happens to be FIRST in a YAML sequence entry ("  - InstallerUrl: ...") would not match
          # either. Today's keys sit inside sequence entries (Installers:, AppsAndFeaturesEntries:)
          # and only match because they aren't the first key — a benign reorder would silently
          # reintroduce the bug, or now, with the throw below, fail the release outright AFTER the
          # installer is signed and the tag is already pushed.
          #
          # Two further subtleties, both of which bit us:
          #
          # 1. The value is matched with [^\r\n]* — NOT `.*$`. In a .NET (?m) regex `.` matches \r
          #    and `$` anchors only BEFORE the \n, so `.*$` swallows the CR of every CRLF line it
          #    rewrites. The runner checks out CRLF (core.autocrlf=true, no .gitattributes), so the
          #    old pattern emitted a mixed-EOL manifest — 23 CRLF + 4 bare LF — and published it as
          #    a release asset. `winget validate` tolerates it, so it never surfaced.
          #
          # 2. Indentation is [ \t]*, NOT \s*. \s matches \r and \n, so `^(\s*Key...)` could start
          #    the match on an earlier line and hoover up newlines into the captured prefix.
          #
          # Asserts EXACTLY ONE match, not "at least one": -replace rewrites EVERY match, while the
          # old `-notmatch` guard only proved a key matched at least once. The old column-0 anchor
          # made multi-match impossible; allowing indentation removed that guarantee, and this file
          # already has `InstallerType` at column 0 AND nested under AppsAndFeaturesEntries. Patching
          # a duplicated key would silently rewrite both lines — the same silent-wrong-artefact class
          # the throw was added to prevent.
          function Set-YamlValue {
            param([string]$File, [string]$Key, [string]$Value)
            $content = Get-Content $File -Raw
            $pattern = "(?m)^([ \t]*(?:-[ \t]+)?$Key[ \t]*:[ \t]*)[^\r\n]*"
            $hits = [regex]::Matches($content, $pattern)
            if ($hits.Count -ne 1) {
              throw "Set-YamlValue: key '$Key' matched $($hits.Count) line(s) in $File — expected exactly 1."
            }
            # '$' is the replacement-token sigil; double it so a value containing '$' stays literal.
            $replacement = '${1}' + ($Value -replace '\$', '$$$$')
            $content = [regex]::Replace($content, $pattern, $replacement)
            Set-Content $File -Value $content -NoNewline
          }

          # installer manifest
          Set-YamlValue $installerYaml 'PackageVersion'   $ver
          Set-YamlValue $installerYaml 'InstallerSha256'  $sha256

          # Update InstallerUrl to point at the new release asset
          $url = "https://github.com/${{ github.repository }}/releases/download/$tag/ChargeKeeper-Setup-$ver.exe"
          Set-YamlValue $installerYaml 'InstallerUrl' $url

          # Also update DisplayVersion inside AppsAndFeaturesEntries
          Set-YamlValue $installerYaml 'DisplayVersion' $ver

          # version manifest
          Set-YamlValue $versionYaml 'PackageVersion' $ver

          # locale manifest
          Set-YamlValue $localeYaml 'PackageVersion' $ver

          Write-Host "Manifests updated:"
          Get-Content $installerYaml | Write-Host

      # ── 10b. Assert the patched manifests describe THIS build ────────────────
      # `winget validate` (next step) checks the SCHEMA only. It cannot see that an
      # InstallerSha256 belongs to a different build or that an InstallerUrl 404s —
      # which is exactly why the 1.0.0 placeholders sailed through six releases.
      # These are content assertions, and they run BEFORE the release is created so a
      # mismatch fails while the only sunk cost is a build.
      - name: Verify patched manifests
        shell: pwsh
        run: |
          $ver   = '${{ steps.version.outputs.version }}'
          $tag   = "v$ver"
          $setup = "installer\Output\ChargeKeeper-Setup-$ver.exe"

          $installerYaml = 'installer\winget\0z00z0.ChargeKeeper.installer.yaml'
          $versionYaml   = 'installer\winget\0z00z0.ChargeKeeper.yaml'
          $localeYaml    = 'installer\winget\0z00z0.ChargeKeeper.locale.en-US.yaml'

          $errors = @()

          function Get-YamlValue([string]$File, [string]$Key) {
            $content = Get-Content $File -Raw
            $m = [regex]::Matches($content, "(?m)^[ \t]*(?:-[ \t]+)?$Key[ \t]*:[ \t]*([^\r\n]*)")
            if ($m.Count -ne 1) { throw "Get-YamlValue: key '$Key' matched $($m.Count) line(s) in $File — expected exactly 1." }
            $m[0].Groups[1].Value.Trim()
          }

          # 1. The SHA in the manifest must be the SHA of the installer we are shipping.
          $actualSha   = (Get-FileHash $setup -Algorithm SHA256).Hash.ToUpper()
          $manifestSha = (Get-YamlValue $installerYaml 'InstallerSha256').ToUpper()
          if ($manifestSha -ne $actualSha) {
            $errors += "InstallerSha256 mismatch:`n    manifest: $manifestSha`n    installer: $actualSha"
          } else {
            Write-Host "OK  InstallerSha256 matches $setup ($actualSha)"
          }

          # 2. The URL must point at this tag's asset.
          $expectedUrl = "https://github.com/${{ github.repository }}/releases/download/$tag/ChargeKeeper-Setup-$ver.exe"
          $manifestUrl = Get-YamlValue $installerYaml 'InstallerUrl'
          if ($manifestUrl -ne $expectedUrl) {
            $errors += "InstallerUrl mismatch:`n    manifest: $manifestUrl`n    expected: $expectedUrl"
          } else {
            Write-Host "OK  InstallerUrl points at $tag"
          }

          # 3. Every manifest must carry this version.
          foreach ($f in @($installerYaml, $versionYaml, $localeYaml)) {
            $pv = Get-YamlValue $f 'PackageVersion'
            if ($pv -ne $ver) { $errors += "PackageVersion in $f is '$pv', expected '$ver'." }
            else { Write-Host "OK  PackageVersion $pv in $(Split-Path $f -Leaf)" }
          }
          $dv = Get-YamlValue $installerYaml 'DisplayVersion'
          if ($dv -ne $ver) { $errors += "DisplayVersion is '$dv', expected '$ver'." }
          else { Write-Host "OK  DisplayVersion $dv" }

          # 4. No mixed line endings. Patching used to strip the CR from just the lines it
          #    rewrote, shipping a half-CRLF file. All-CRLF or all-LF is fine; a mix means
          #    Set-YamlValue has regressed.
          foreach ($f in @($installerYaml, $versionYaml, $localeYaml)) {
            $bytes = [IO.File]::ReadAllBytes($f)
            $crlf = 0; $bare = 0
            for ($i = 0; $i -lt $bytes.Length; $i++) {
              if ($bytes[$i] -eq 10) {
                if ($i -gt 0 -and $bytes[$i - 1] -eq 13) { $crlf++ } else { $bare++ }
              }
            }
            if ($crlf -gt 0 -and $bare -gt 0) {
              $errors += "$f has mixed line endings ($crlf CRLF + $bare bare LF) — Set-YamlValue is stripping CRs again."
            } else {
              Write-Host "OK  $(Split-Path $f -Leaf) line endings consistent ($crlf CRLF, $bare LF)"
            }
          }

          if ($errors.Count -gt 0) {
            Write-Host ''
            foreach ($e in $errors) { Write-Host "FAIL  $e" }
            throw "Patched winget manifests do not describe this build ($($errors.Count) problem(s)). Refusing to publish."
          }
          Write-Host ''
          Write-Host 'All manifest content assertions passed.'

      # ── 11. Validate winget manifests (against the patched files) ───────────────
      - name: Validate winget manifests
        shell: pwsh
        run: |
          $wg = Get-Command winget -ErrorAction SilentlyContinue
          if (-not $wg) {
            Write-Warning 'winget not found on this runner; skipping manifest validation.'
          } else {
            winget validate --manifest installer\winget
            if ($LASTEXITCODE -ne 0) {
              Write-Error "winget validate failed (exit $LASTEXITCODE)."
              exit $LASTEXITCODE
            }
            Write-Host 'Manifests are valid.'
          }

      # ── 12. Create GitHub Release (tag pushes only) ──────────────────────────
      # A manual workflow_dispatch is a dry-run: it builds, signs, and validates
      # the manifests but does NOT publish a release.
      - name: Create GitHub Release
        if: ${{ github.ref_type == 'tag' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || format('v{0}', steps.version.outputs.version) }}
          name: ChargeKeeper v${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          files: |
            installer/Output/ChargeKeeper-Setup-${{ steps.version.outputs.version }}.exe
            installer/winget/0z00z0.ChargeKeeper.installer.yaml
            installer/winget/0z00z0.ChargeKeeper.yaml
            installer/winget/0z00z0.ChargeKeeper.locale.en-US.yaml
          body: |
            ## ChargeKeeper v${{ steps.version.outputs.version }}

            **Install / upgrade via winget:**
            ```
            winget install 0z00z0.ChargeKeeper
            winget upgrade 0z00z0.ChargeKeeper
            ```

            Or download `ChargeKeeper-Setup-${{ steps.version.outputs.version }}.exe` below — per-user installer, no admin required.

            **SHA256 (installer):** `${{ steps.sha256.outputs.sha256 }}`

  # ─────────────────────────────────────────────────────────────────────────────
  # Post-release: download the manifest assets from the release and re-validate
  # ─────────────────────────────────────────────────────────────────────────────
  validate-manifests:
    runs-on: windows-latest
    needs: release
    # Only runs for real (tag) releases — a dispatch dry-run publishes no assets.
    if: ${{ github.ref_type == 'tag' }}

    steps:
      # Download the three winget manifest assets that were attached to the release
      - name: Download winget manifests from release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = 'v${{ needs.release.outputs.version }}'
          $outDir = 'winget-validate'
          New-Item -ItemType Directory -Force -Path $outDir | Out-Null

          $assets = @(
            '0z00z0.ChargeKeeper.installer.yaml',
            '0z00z0.ChargeKeeper.yaml',
            '0z00z0.ChargeKeeper.locale.en-US.yaml'
          )
          foreach ($a in $assets) {
            gh release download $tag --repo ${{ github.repository }} --pattern $a --dir $outDir
          }

      - name: Validate downloaded manifests
        shell: pwsh
        run: |
          $wg = Get-Command winget -ErrorAction SilentlyContinue
          if (-not $wg) {
            Write-Warning 'winget not found on this runner; skipping schema validation.'
          } else {
            winget validate --manifest winget-validate
            if ($LASTEXITCODE -ne 0) {
              Write-Error "winget validate failed (exit $LASTEXITCODE)."
              exit $LASTEXITCODE
            }
            Write-Host 'Released manifests pass schema validation.'
          }

      # The check that actually matters: follow the PUBLISHED manifest's own InstallerUrl,
      # download whatever is really at the other end, and hash it. `winget validate` above is
      # schema-only — it cannot tell that a URL 404s or that a SHA belongs to another build,
      # which is how the v1.0.0 placeholders survived six releases. This step would have
      # caught that on v1.0.1.
      - name: Verify released installer matches released manifest
        shell: pwsh
        run: |
          $manifest = 'winget-validate\0z00z0.ChargeKeeper.installer.yaml'
          $content  = Get-Content $manifest -Raw

          function Get-YamlValue([string]$Text, [string]$Key) {
            $m = [regex]::Matches($Text, "(?m)^[ \t]*(?:-[ \t]+)?$Key[ \t]*:[ \t]*([^\r\n]*)")
            if ($m.Count -ne 1) { throw "key '$Key' matched $($m.Count) line(s) in the released manifest — expected exactly 1." }
            $m[0].Groups[1].Value.Trim()
          }

          $url          = Get-YamlValue $content 'InstallerUrl'
          $manifestSha  = (Get-YamlValue $content 'InstallerSha256').ToUpper()
          $expectedTag  = 'v${{ needs.release.outputs.version }}'
          $expectedSha  = '${{ needs.release.outputs.sha256 }}'.ToUpper()

          Write-Host "Released InstallerUrl: $url"

          if ($url -notlike "*/download/$expectedTag/*") {
            throw "Released InstallerUrl does not point at $expectedTag — this is the stale-manifest bug: $url"
          }
          if ($manifestSha -ne $expectedSha) {
            throw "Released InstallerSha256 ($manifestSha) != the SHA the build computed ($expectedSha)."
          }

          # Follow the URL for real. A 404 here means the manifest points at an asset that
          # does not exist, which no schema check can detect.
          $dl = Join-Path $env:RUNNER_TEMP 'released-installer.exe'
          try {
            Invoke-WebRequest -Uri $url -OutFile $dl -MaximumRedirection 5 -UseBasicParsing
          } catch {
            throw "Released InstallerUrl is not downloadable ($url): $($_.Exception.Message)"
          }

          $actualSha = (Get-FileHash $dl -Algorithm SHA256).Hash.ToUpper()
          if ($actualSha -ne $manifestSha) {
            throw "Published installer SHA256 ($actualSha) != released manifest InstallerSha256 ($manifestSha)."
          }

          Remove-Item $dl -Force
          Write-Host "OK  $url downloads and hashes to $actualSha, matching the released manifest."
