name: CI

# Build on every push and PR to main. Keeps the release path (release.yml) lean —
# this catches build regressions continuously, not only at release time.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ProjectReference to ZeroZero.Brand.WinUI uses a relative path expecting a
      # sibling checkout (..\0z0-shared\src\...) — locally that's a sibling
      # folder. actions/checkout refuses a `path:` outside the workspace
      # ("not under D:\a\ChargeKeeper\ChargeKeeper"), so clone the (public) repo
      # directly beside this checkout instead. (Repo was renamed ZeroZeroBrand → 0z0-shared.)
      #
      # PINNED to the exact 0z0-shared commit this app was validated against, so
      # builds are reproducible and library changes can't break this repo's CI
      # unnoticed. The SHA lives in a SINGLE shared file — `.github/0z0-shared-ref`
      # — that both this workflow and release.yml read, so the two pins can no
      # longer drift out of lockstep. Bump the SHA there (the bump procedure is
      # documented in that file).
      - name: Clone 0z0-shared (sibling dependency, pinned)
        shell: pwsh
        run: |
          $ref = (Get-Content .github/0z0-shared-ref |
                  Where-Object { $_.Trim() -and $_ -notmatch '^\s*#' } |
                  Select-Object -First 1).Trim()
          Write-Host "Pinned 0z0-shared ref: $ref"
          git clone https://github.com/0z00z0/0z0-shared.git ../0z0-shared
          git -C ../0z0-shared checkout --detach $ref

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      # The app targets win-x64 with ReadyToRun on Release, which needs the
      # win-x64 runtime pack — restore/build must specify the RID (NETSDK1112).
      - name: Restore
        run: dotnet restore ChargeKeeper.csproj -r win-x64

      - name: Build (Release)
        run: dotnet build ChargeKeeper.csproj -c Release -r win-x64 --no-restore --nologo
