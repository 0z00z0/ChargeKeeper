name: CI

# Build on every push and PR to main. Keeps the release path (release.yml) lean —
# this catches build regressions continuously, not only at release time.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ProjectReference to ZeroZero.Brand.WinUI uses a relative path expecting a
      # sibling checkout (..\ZeroZeroBrand\src\...) — locally that's a sibling
      # folder. actions/checkout refuses a `path:` outside the workspace
      # ("not under D:\a\ChargeKeeper\ChargeKeeper"), so clone the (public) repo
      # directly beside this checkout instead.
      #
      # PINNED to the exact ZeroZeroBrand commit this app was validated against, so
      # builds are reproducible and library changes can't break this repo's CI
      # unnoticed. To bump: sync the local sibling clone, re-run build+tests+the
      # About window, then update ZEROZEROBRAND_REF here AND in release.yml
      # (`git -C ..\ZeroZeroBrand rev-parse origin/main` prints the new SHA).
      # Once ZeroZeroBrand publishes versioned tags/releases, pin a tag instead
      # (tracked in that repo's issues).
      - name: Clone ZeroZeroBrand (sibling dependency, pinned)
        env:
          ZEROZEROBRAND_REF: d597b79b99b482684e40fded68468d5be70d40df
        run: |
          git clone https://github.com/0z00z0/ZeroZeroBrand.git ../ZeroZeroBrand
          git -C ../ZeroZeroBrand checkout --detach $env:ZEROZEROBRAND_REF

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      # The app targets win-x64 with ReadyToRun on Release, which needs the
      # win-x64 runtime pack — restore/build must specify the RID (NETSDK1112).
      - name: Restore
        run: dotnet restore ChargeKeeper.csproj -r win-x64

      - name: Build (Release)
        run: dotnet build ChargeKeeper.csproj -c Release -r win-x64 --no-restore --nologo
