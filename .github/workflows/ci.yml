name: CI

# Build on every push and PR to main. Keeps the release path (release.yml) lean —
# this catches build regressions continuously, not only at release time.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ProjectReference to ZeroZero.Brand.WinUI uses a relative path expecting
      # a sibling checkout (..\ZeroZeroBrand\src\...) — locally that's a sibling
      # folder; in CI the runner only checks out this repo, so we fetch it here.
      - name: Checkout ZeroZeroBrand (sibling dependency)
        uses: actions/checkout@v4
        with:
          repository: 0z00z0/ZeroZeroBrand
          path: ../ZeroZeroBrand

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      # The app targets win-x64 with ReadyToRun on Release, which needs the
      # win-x64 runtime pack — restore/build must specify the RID (NETSDK1112).
      - name: Restore
        run: dotnet restore ChargeKeeper.csproj -r win-x64

      - name: Build (Release)
        run: dotnet build ChargeKeeper.csproj -c Release -r win-x64 --no-restore --nologo
